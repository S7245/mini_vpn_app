name: MiniVPN
options:
  bundleIdPrefix: com.s7245.minivpn
  deploymentTarget:
    macOS: "13.0"
packages:
  MiniVPNCore:
    path: ../Core
targets:
  MiniVPN:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
    dependencies:
      - package: MiniVPNCore
        product: MiniVPNCore
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: MiniVPN
        LSUIElement: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.s7245.minivpn.app
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
