openapi: 3.1.0
info:
  title: mini_vpn backend API
  version: 0.1.0
  description: >
    Control-plane API ② consumed by the client apps. Multi-user commercial
    service: email+password auth, time-based subscription, device binding,
    shared + dedicated-static-IP nodes. Payment flows are not implemented in
    this version (read-only status + 501 stubs only).
servers:
  - url: http://localhost:8080
    description: local dev
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    User:
      type: object
      required: [id, email, created_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        created_at: { type: string, format: date-time }
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, const: Bearer }
        expires_in: { type: integer, description: access token lifetime in seconds }
    Credentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password: { type: string }
        new_password: { type: string, minLength: 8 }
    Subscription:
      type: object
      required: [plan, status, device_limit]
      properties:
        plan: { type: string, enum: [free, monthly, yearly] }
        status: { type: string, enum: [active, expired] }
        expires_at:
          type: [string, "null"]
          format: date-time
          description: null for the free plan
        device_limit: { type: integer, minimum: 1 }
    Device:
      type: object
      required: [id, name, platform, last_seen_at, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        platform: { type: string, enum: [macos, ios, android, windows] }
        last_seen_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    DeviceList:
      type: object
      required: [devices, device_limit]
      properties:
        devices:
          type: array
          items: { $ref: '#/components/schemas/Device' }
        device_limit: { type: integer, minimum: 1 }
    DeviceRegistration:
      type: object
      required: [name, platform]
      properties:
        name: { type: string }
        platform: { type: string, enum: [macos, ios, android, windows] }
    SharedNode:
      type: object
      required: [id, kind, region, city, latency_ms, load, tier]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, const: shared }
        region: { type: string }
        city: { type: string }
        latency_ms: { type: integer, minimum: 0 }
        load: { type: number, minimum: 0, maximum: 1 }
        tier: { type: string, enum: [standard, premium] }
    DedicatedNode:
      type: object
      required: [id, kind, region, city, label, static_ip, expires_at, latency_ms, load]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, const: dedicated }
        region: { type: string }
        city: { type: string }
        label: { type: string }
        static_ip: { type: string, format: ipv4 }
        expires_at: { type: string, format: date-time }
        latency_ms: { type: integer, minimum: 0 }
        load: { type: number, minimum: 0, maximum: 1 }
    Node:
      oneOf:
        - $ref: '#/components/schemas/SharedNode'
        - $ref: '#/components/schemas/DedicatedNode'
      discriminator:
        propertyName: kind
    NodeList:
      type: object
      required: [nodes]
      properties:
        nodes:
          type: array
          items: { $ref: '#/components/schemas/Node' }
    SelectBestResponse:
      type: object
      required: [node_id, reason]
      properties:
        node_id: { type: string, format: uuid }
        reason: { type: string }
paths:
  /auth/register:
    post:
      operationId: register
      summary: Create an account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Credentials' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
              example:
                access_token: demo.access
                refresh_token: demo.refresh
                token_type: Bearer
                expires_in: 3600
  /auth/login:
    post:
      operationId: login
      summary: Exchange credentials for tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Credentials' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
              example:
                access_token: demo.access
                refresh_token: demo.refresh
                token_type: Bearer
                expires_in: 3600
  /auth/refresh:
    post:
      operationId: refresh
      summary: Exchange a refresh token for a new token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
              example:
                access_token: demo.access2
                refresh_token: demo.refresh2
                token_type: Bearer
                expires_in: 3600
  /auth/logout:
    post:
      operationId: logout
      summary: Revoke the current refresh token
      responses:
        '204': { description: no content }
  /auth/password:
    put:
      operationId: changePassword
      summary: Change the account password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '204': { description: no content }
  /subscription:
    get:
      operationId: getSubscription
      summary: Current subscription state for the authenticated user
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
              example:
                plan: monthly
                status: active
                expires_at: '2026-07-12T08:00:00Z'
                device_limit: 3
  /devices:
    get:
      operationId: listDevices
      summary: List devices bound to the account (for the device_limit cap)
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeviceList' }
              example:
                devices:
                  - id: 22222222-2222-4222-8222-222222222222
                    name: Sam's MacBook
                    platform: macos
                    last_seen_at: '2026-06-12T08:30:00Z'
                    created_at: '2026-06-01T10:00:00Z'
                device_limit: 3
    post:
      operationId: registerDevice
      summary: Bind the current device; 409 if device_limit is exceeded
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeviceRegistration' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Device' }
              example:
                id: 22222222-2222-4222-8222-222222222222
                name: Sam's MacBook
                platform: macos
                last_seen_at: '2026-06-12T08:30:00Z'
                created_at: '2026-06-01T10:00:00Z'
        '409':
          description: device limit exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { code: device_limit_exceeded, message: device limit reached }
  /devices/{deviceId}:
    delete:
      operationId: revokeDevice
      summary: Unbind a device
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: no content }
  /nodes:
    get:
      operationId: listNodes
      summary: Shared nodes plus the user's dedicated static-IP nodes
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NodeList' }
              example:
                nodes:
                  - id: 33333333-3333-4333-8333-333333333333
                    kind: shared
                    region: US
                    city: Los Angeles
                    latency_ms: 142
                    load: 0.37
                    tier: standard
                  - id: 55555555-5555-4555-8555-555555555555
                    kind: dedicated
                    region: US
                    city: San Jose
                    label: my-static-1
                    static_ip: 203.0.113.9
                    expires_at: '2026-09-01T00:00:00Z'
                    latency_ms: 130
                    load: 0.05
  /nodes/select-best:
    post:
      operationId: selectBest
      summary: Server picks the best eligible node (by latency/load)
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SelectBestResponse' }
              example:
                node_id: 44444444-4444-4444-8444-444444444444
                reason: lowest latency among eligible nodes
  /purchases/subscription:
    post:
      operationId: purchaseSubscription
      summary: (stub) Buy/renew a subscription — not implemented this version
      responses:
        '501':
          description: not implemented
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { code: not_implemented, message: payment not available yet }
  /purchases/dedicated-ip:
    post:
      operationId: purchaseDedicatedIp
      summary: (stub) Buy a dedicated static IP — not implemented this version
      responses:
        '501':
          description: not implemented
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { code: not_implemented, message: payment not available yet }
