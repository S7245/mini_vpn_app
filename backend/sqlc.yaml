version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/store/migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: false
        overrides:
          - db_type: "uuid"
            go_type: "string"
